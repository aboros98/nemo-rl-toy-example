# NeMo RL GRPO Configuration for CQL RLVR — DUMMY VALIDATION
# Based on: github.com/NVIDIA-NeMo/RL/blob/main/examples/configs/grpo_math_1B.yaml
#
# This is the DUMMY config for single-GPU infrastructure validation.
# For production training with Nemotron-30B-A3B, use:
#   configs/cql_nemo_rl_nemotron30b.yaml
#
# Uses Nemotron-Mini-4B-Instruct as primary model (Llama-3.2-1B or Qwen2.5-1.5B as fallback).
#
# NOTE: When running under real NeMo RL, OmegaConf resolves ${...} variable
# interpolation. This config uses hardcoded values so it also works with
# yaml.safe_load in our dummy training script.

# ============================================================================
# GRPO Algorithm Configuration
# ============================================================================
grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 4  # 4 rollouts per prompt
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 10  # Dummy run: 10 steps only
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 5
  val_at_start: false
  val_at_end: true
  overlong_filtering: false
  max_val_samples: 16
  val_batch_size: 16
  seed: 42
  use_dynamic_sampling: true  # Filter zero-variance groups
  dynamic_sampling_max_gen_batches: 5
  batch_multiplier: 1
  reward_shaping:
    enabled: false

  adv_estimator:
    name: "grpo"
    normalize_rewards: true
    use_leave_one_out_baseline: true

  reward_scaling:
    enabled: false

  async_grpo:
    enabled: false

  seq_logprob_error_threshold: null

# ============================================================================
# Loss Function
# ============================================================================
loss_fn:
  reference_policy_kl_penalty: 0.0  # No KL penalty (as specified)
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  # Clipping: these are epsilon values, not absolute bounds.
  # ratio_clip_min: 0.2  →  ratio lower bound = 1 - 0.2 = 0.8
  # ratio_clip_max: 0.28 →  ratio upper bound = 1 + 0.28 = 1.28
  # Asymmetric ("Clip-Higher"): wider upper clip for positive advantages.
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  # ── Alternative: Asymmetric "Clip-Higher" ──
  # ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: false
  token_level_loss: true  # Token-level loss enabled
  force_on_policy_ratio: false
  use_kl_in_reward: false

# ============================================================================
# Checkpointing
# ============================================================================
checkpointing:
  enabled: true
  checkpoint_dir: "results/cql_grpo"
  metric_name: "train:reward_mean"
  higher_is_better: true
  keep_top_k: 2
  save_period: 5

# ============================================================================
# Policy (Model) Configuration
# ============================================================================
policy:
  # Primary: Nemotron-Mini-4B-Instruct (per spec). Fallbacks below.
  model_name: "nvidia/Nemotron-Mini-4B-Instruct"
  # Fallback options (if Nemotron weights are unavailable):
  # model_name: "meta-llama/Llama-3.2-1B-Instruct"
  # model_name: "Qwen/Qwen2.5-1.5B"
  tokenizer:
    name: "nvidia/Nemotron-Mini-4B-Instruct"  # must match model_name
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 16  # 4 prompts * 4 generations
  train_micro_batch_size: 4
  generation_batch_size: 16
  logprob_batch_size: 4
  max_total_sequence_length: 512  # Max response length
  precision: "bfloat16"
  max_grad_norm: 1.0

  # DTensor configuration with LoRA
  dtensor_cfg:
    _v2: true
    enabled: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1  # No tensor parallelism (single GPU)
    context_parallel_size: 1

    # LoRA Configuration
    lora_cfg:
      enabled: true  # Enable LoRA to fit on single GPU
      target_modules: []
      exclude_modules: []
      match_all_linear: true  # Apply to all linear layers
      dim: 16      # LoRA rank 16
      alpha: 32    # LoRA alpha 32 (effective scale = alpha/dim = 2.0)
      # NOTE: DoRA (Weight-Decomposed LoRA) is specified in the project design
      # but is NOT currently supported by NeMo RL's lora_cfg. When NeMo RL adds
      # DoRA support, enable it here with: use_dora: true
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  # Megatron (disabled for single GPU)
  megatron_cfg:
    enabled: false

  # Sequence packing
  sequence_packing:
    enabled: true
    train_mb_tokens: 2048  # 512 * 4
    logprob_mb_tokens: 2048
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  # Optimizer
  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1e-8
      foreach: false
      fused: false

  # ── LR Scheduler ──
  # Default: warmup → constant (RECOMMENDED for GRPO/RLVR)
  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 3  # Short warmup for 10 steps
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000
    - milestones: [3]

  # ── Alternative: Warmup → Cosine Decay ──
  # scheduler:
  #   - name: "torch.optim.lr_scheduler.LinearLR"
  #     kwargs: { start_factor: 0.1, end_factor: 1.0, total_iters: 3 }
  #   - name: "torch.optim.lr_scheduler.CosineAnnealingLR"
  #     kwargs: { T_max: 7, eta_min: 1.0e-7 }
  #   - milestones: [3]

  # Generation
  generation:
    backend: "vllm"
    max_new_tokens: 512
    temperature: 0.8
    top_p: 0.95
    top_k: null
    stop_strings: ["\n\n", "```", "Explanation:", "Note:"]  # Prevent post-query rambling
    vllm_cfg:
      async_engine: false
      precision: "bfloat16"
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: 512
      enforce_eager: true  # Safer for single GPU
    colocated:
      enabled: true  # Share training GPU for generation

# ============================================================================
# Data
# ============================================================================
data:
  max_input_seq_length: 512
  shuffle: true
  num_workers: 1
  use_multiple_dataloader: false
  train:
    data_path: "data/train.jsonl"
    input_key: "nl_query"            # Natural language question
    output_key: "cql_query"          # Golden CQL/KQL query
  validation:
    data_path: "data/val.jsonl"
    input_key: "nl_query"
    output_key: "cql_query"
  default:
    dataset_name: "ResponseDataset"
    prompt_file: null                                      # Optional: wraps user message via .format()
    system_prompt_file: "resources/cql_system_prompt.txt"   # Few-shot expert prompt → separate system role
    processor: "cql_data_processor"                         # Custom: injects system prompt as role, uses chat template
    env_name: "cql"

# ============================================================================
# Environment (CQL Resource Server)
# ============================================================================
env:
  cql:
    num_workers: 1

# ============================================================================
# Logger — TensorBoard enabled for dummy validation
# ============================================================================
logger:
  log_dir: "logs"
  num_val_samples_to_print: 2
  wandb_enabled: false
  tensorboard_enabled: true                    # ← YES, NeMo RL supports TensorBoard natively
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: false
  tensorboard: {}                              # Uses log_dir by default
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

# ============================================================================
# Cluster (Single GPU)
# ============================================================================
cluster:
  gpus_per_node: 1
  num_nodes: 1
